name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const { issue, action } = context.payload;
            if (!issue) {
              core.warning('No issue payload found, skipping triage.');
              return;
            }

            const issueNumber = issue.number;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const { owner, repo } = context.repo;

            const existingLabels = issue.labels.map(l =>
              typeof l === 'string' ? l : l.name
            );

            const priorityLabels = [
              'priority-critical',
              'priority-high',
              'priority-medium',
              'priority-low',
            ];

            // Start from existing non-priority labels
            let newLabels = existingLabels.filter(
              l => !priorityLabels.includes(l)
            );

            // Ensure a status label exists: prefer needs-triage if none present
            const statusLabels = ['needs-triage', 'needs-review'];
            if (!newLabels.some(l => statusLabels.includes(l))) {
              newLabels.push('needs-triage');
            }

            // Category labels from title (case-insensitive)
            if (title.includes('bug') && !newLabels.includes('bug')) {
              newLabels.push('bug');
            }
            if (title.includes('epic') && !newLabels.includes('epic')) {
              newLabels.push('epic');
            }
            if (title.includes('maintenance') && !newLabels.includes('maintenance')) {
              newLabels.push('maintenance');
            }

            // Priority detection from title/body
            const content = `${title} ${body}`;

            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];

            const containsAny = words => words.some(w => content.includes(w));

            let priority = 'priority-medium';
            if (containsAny(criticalKeywords)) {
              priority = 'priority-critical';
            } else if (containsAny(highKeywords)) {
              priority = 'priority-high';
            } else if (containsAny(mediumKeywords)) {
              priority = 'priority-medium';
            } else if (containsAny(lowKeywords)) {
              priority = 'priority-low';
            }

            if (!newLabels.includes(priority)) {
              newLabels.push(priority);
            }

            // Only update if labels actually change
            const labelsChanged =
              newLabels.length !== existingLabels.length ||
              newLabels.some(l => !existingLabels.includes(l));

            if (!labelsChanged) {
              core.info('Triage labels already up to date; nothing to do.');
              return;
            }

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              labels: newLabels,
            });

  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            if (!issue) {
              core.warning('No issue payload found, skipping task breakdown.');
              return;
            }

            const { owner, repo } = context.repo;
            const issueNumber = issue.number;
            const title = issue.title || '';

            // Only operate on epic-type issues (case-insensitive match on title)
            if (!title.toLowerCase().includes('epic')) {
              core.info('Issue is not an epic; skipping subtask creation.');
              return;
            }

            // Avoid duplicate subtask creation if already processed
            const currentBody = issue.body || '';
            if (currentBody.includes('## Epic Tasks')) {
              core.info('Epic tasks already present on issue; skipping.');
              return;
            }

            const taskNames = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation',
            ];

            const subIssueNumbers = [];

            for (let i = 0; i < taskNames.length; i++) {
              const taskTitle = `[SUBTASK] ${title} - Task ${i + 1}: ${taskNames[i]}`;
              const body = `Related to #${issueNumber}`;

              try {
                const { data: subIssue } = await github.rest.issues.create({
                  owner,
                  repo,
                  title: taskTitle,
                  body,
                  labels: ['enhancement', 'needs-review'],
                });
                subIssueNumbers.push(subIssue.number);
              } catch (error) {
                core.warning(`Failed to create sub-issue ${i + 1}: ${error.message}`);
              }
            }

            if (subIssueNumbers.length === 0) {
              core.warning('No sub-issues were created; skipping epic checklist update.');
              return;
            }

            const checklistLines = subIssueNumbers
              .map((num, index) => `- [ ] Task ${index + 1}: #${num}`)
              .join('\n');

            const prefix = currentBody ? `${currentBody}\n\n` : '';
            const updatedBody = `${prefix}## Epic Tasks\n${checklistLines}`;

            try {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                body: updatedBody,
              });
            } catch (error) {
              core.warning(`Failed to update epic issue body: ${error.message}`);
            }

  auto-response:
    needs: issue-triage
    runs-on: ubuntu-latest
    steps:
      - name: Auto respond to issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { issue } = context.payload;

            if (!issue) {
              core.warning('No issue payload found, skipping auto-response.');
              return;
            }

            const issueNumber = issue.number;
            const author = issue.user.login;

            // Helper: ensure labels exist with desired metadata
            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  try {
                    await github.rest.issues.createLabel({
                      owner,
                      repo,
                      name,
                      color,
                      description,
                    });
                  } catch (createError) {
                    // Another concurrent workflow may have created it; log and continue
                    core.warning(
                      `Error creating label ${name}: ${createError.message}`
                    );
                  }
                } else {
                  core.warning(
                    `Error ensuring label ${name}: ${error.message}`
                  );
                }
              }
            };

            // Category labels
            await ensureLabel('bug', 'd73a4a', "Something isn't working");
            await ensureLabel('enhancement', 'a2eeef', 'New feature or request');
            await ensureLabel(
              'epic',
              '5319e7',
              'Large feature requiring multiple sub-tasks'
            );
            await ensureLabel(
              'maintenance',
              'c5def5',
              'Maintenance and housekeeping tasks'
            );

            // Priority labels
            await ensureLabel(
              'priority-critical',
              'b60205',
              'Critical priority issue'
            );
            await ensureLabel(
              'priority-high',
              'd93f0b',
              'High priority issue'
            );
            await ensureLabel(
              'priority-medium',
              'fbca04',
              'Medium priority issue'
            );
            await ensureLabel(
              'priority-low',
              '0e8a16',
              'Low priority issue'
            );

            // Status labels
            await ensureLabel(
              'needs-triage',
              'ededed',
              'Needs to be reviewed by maintainers'
            );
            await ensureLabel(
              'needs-review',
              '5319e7',
              'Awaiting review from maintainers'
            );
            await ensureLabel(
              'first-time-contributor',
              '0e8a16',
              'Issue created by first-time contributor'
            );

            // Reload the latest issue data so we see labels from triage
            let latestIssue = issue;
            try {
              const { data } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });
              latestIssue = data;
            } catch (error) {
              core.warning(
                `Failed to reload latest issue data; using event payload: ${error.message}`
              );
            }

            let labels = latestIssue.labels.map(l =>
              typeof l === 'string' ? l : l.name
            );

            const hasLabel = name => labels.includes(name);

            // Determine whether we've already processed this issue:
            // if it already has needs-review but not needs-triage, assume processed.
            const alreadyProcessed =
              labels.includes('needs-review') && !labels.includes('needs-triage');

            // Determine if this is the author's first issue in this repo
            let isFirstIssueInRepo = false;
            try {
              const { data: authoredIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                creator: author,
                state: 'all',
                per_page: 2,
              });
              const otherIssues = authoredIssues.filter(
                i => i.number !== issueNumber
              );
              isFirstIssueInRepo = otherIssues.length === 0;
            } catch (error) {
              core.warning(
                `Failed to check first-time contributor status: ${error.message}`
              );
            }

            const titleLower = (latestIssue.title || '').toLowerCase();

            // Build response comment
            let responseBody = '';

            if (hasLabel('bug') || titleLower.includes('bug')) {
              responseBody =
                'Thank you for reporting this issue! Please review our **Bug Report Guidelines** to ensure we have all the details needed to investigate.\n\n';
            } else if (hasLabel('epic') || titleLower.includes('epic')) {
              responseBody =
                'Thank you for opening this epic! Please review our **Feature Request Process** so we can scope and prioritize this work effectively.\n\n';
            } else if (hasLabel('maintenance') || titleLower.includes('maintenance')) {
              responseBody =
                'Thank you for highlighting this maintenance work. Please review our **Maintenance Guidelines** to help us plan and schedule this task.\n\n';
            } else {
              responseBody =
                'Thank you for opening this issue! A maintainer will review it soon.\n\n';
            }

            if (isFirstIssueInRepo) {
              responseBody =
                `Welcome @${author} and thank you for your first issue in this repository!\n\n` +
                responseBody;
            }

            // If we've already processed the issue once, don't post another comment
            if (alreadyProcessed) {
              core.info(
                'Issue already in needs-review state; skipping additional auto-response.'
              );
            } else {
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: responseBody,
                });
              } catch (error) {
                core.warning(
                  `Failed to create auto-response comment: ${error.message}`
                );
              }
            }

            // Set milestone for high/critical priority issues
            const priorityForMilestone = ['priority-critical', 'priority-high'];
            let milestoneNumber =
              latestIssue.milestone && latestIssue.milestone.number
                ? latestIssue.milestone.number
                : null;

            const hasHighPriority = priorityForMilestone.some(p =>
              labels.includes(p)
            );

            if (hasHighPriority) {
              try {
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: 'open',
                });
                let milestone = milestones.find(m => m.title === 'v1.0.0');

                if (!milestone) {
                  const { data: createdMilestone } =
                    await github.rest.issues.createMilestone({
                      owner,
                      repo,
                      title: 'v1.0.0',
                      description:
                        'Initial release milestone for high priority work.',
                    });
                  milestone = createdMilestone;
                }

                milestoneNumber = milestone.number;
              } catch (error) {
                core.warning(
                  `Failed to ensure v1.0.0 milestone: ${error.message}`
                );
              }
            }

            // Update labels: move needs-triage -> needs-review, add first-time-contributor
            let newLabels = labels.filter(l => l !== 'needs-triage');

            if (!newLabels.includes('needs-review')) {
              newLabels.push('needs-review');
            }
            if (isFirstIssueInRepo && !newLabels.includes('first-time-contributor')) {
              newLabels.push('first-time-contributor');
            }

            // Deduplicate labels
            newLabels = Array.from(new Set(newLabels));

            const labelsChanged =
              newLabels.length !== labels.length ||
              newLabels.some(l => !labels.includes(l));
            const milestoneChanged =
              (latestIssue.milestone && latestIssue.milestone.number) !==
              milestoneNumber;

            if (!labelsChanged && !milestoneChanged) {
              core.info('Labels and milestone already up to date; no update needed.');
              return;
            }

            try {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                labels: newLabels,
                milestone: milestoneNumber,
              });
            } catch (error) {
              core.warning(
                `Failed to update issue labels/milestone: ${error.message}`
              );
            }
